name: Build Label Printer EXE

on:
  push:
    branches: [ "main" ] # سيعمل الأكشن عند الرفع على فرع main

jobs:
  build:
    runs-on: windows-latest # ضروري جداً استخدام ويندوز لبناء مكتبة win32print

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile pricesticker.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FridgeLabelPrinter
        path: dist/pricesticker.exe
